asyncapi: 3.0.0
info:
  title: SMS Socket App Gateway
  version: 0.2.0
  description: |
    Local-only WebSocket API exposed by the Android foreground gateway service.
    SMS behavior remains backward compatible while MMS is added as an additive feature.
servers:
  localGateway:
    host: "{phoneIp}:8787"
    protocol: ws
    description: Connect from the same LAN as the Android device.
    variables:
      phoneIp:
        default: 192.168.1.25
channels:
  gateway:
    address: /
    messages:
      authenticate:
        $ref: "#/components/messages/Authenticate"
      getGatewayState:
        $ref: "#/components/messages/GetGatewayState"
      requestDialerRole:
        $ref: "#/components/messages/RequestDialerRole"
      getDialerState:
        $ref: "#/components/messages/GetDialerState"
      listSubscriptions:
        $ref: "#/components/messages/ListSubscriptions"
      rehydrate:
        $ref: "#/components/messages/Rehydrate"
      sendSms:
        $ref: "#/components/messages/SendSms"
      sendMms:
        $ref: "#/components/messages/SendMms"
      placeCall:
        $ref: "#/components/messages/PlaceCall"
      answerCall:
        $ref: "#/components/messages/AnswerCall"
      rejectCall:
        $ref: "#/components/messages/RejectCall"
      endCall:
        $ref: "#/components/messages/EndCall"
      setMuted:
        $ref: "#/components/messages/SetMuted"
      sendDtmf:
        $ref: "#/components/messages/SendDtmf"
      showInCallScreen:
        $ref: "#/components/messages/ShowInCallScreen"
      ack:
        $ref: "#/components/messages/Ack"
      response:
        $ref: "#/components/messages/Response"
      smsReceived:
        $ref: "#/components/messages/SmsReceived"
      smsOutboundAccepted:
        $ref: "#/components/messages/SmsOutboundAccepted"
      smsOutboundSent:
        $ref: "#/components/messages/SmsOutboundSent"
      smsOutboundDelivered:
        $ref: "#/components/messages/SmsOutboundDelivered"
      smsOutboundFailed:
        $ref: "#/components/messages/SmsOutboundFailed"
      mmsReceived:
        $ref: "#/components/messages/MmsReceived"
      mmsOutboundAccepted:
        $ref: "#/components/messages/MmsOutboundAccepted"
      mmsOutboundSent:
        $ref: "#/components/messages/MmsOutboundSent"
      mmsOutboundDelivered:
        $ref: "#/components/messages/MmsOutboundDelivered"
      mmsOutboundFailed:
        $ref: "#/components/messages/MmsOutboundFailed"
      dialerState:
        $ref: "#/components/messages/DialerState"
      callAdded:
        $ref: "#/components/messages/CallAdded"
      callUpdated:
        $ref: "#/components/messages/CallUpdated"
      callRemoved:
        $ref: "#/components/messages/CallRemoved"
      gatewayState:
        $ref: "#/components/messages/GatewayState"
operations:
  sendAuthenticate:
    action: send
    channel:
      $ref: "#/channels/gateway"
    messages:
      - $ref: "#/channels/gateway/messages/authenticate"
  sendCommand:
    action: send
    channel:
      $ref: "#/channels/gateway"
    messages:
      - $ref: "#/channels/gateway/messages/getGatewayState"
      - $ref: "#/channels/gateway/messages/requestDialerRole"
      - $ref: "#/channels/gateway/messages/getDialerState"
      - $ref: "#/channels/gateway/messages/listSubscriptions"
      - $ref: "#/channels/gateway/messages/rehydrate"
      - $ref: "#/channels/gateway/messages/sendSms"
      - $ref: "#/channels/gateway/messages/sendMms"
      - $ref: "#/channels/gateway/messages/placeCall"
      - $ref: "#/channels/gateway/messages/answerCall"
      - $ref: "#/channels/gateway/messages/rejectCall"
      - $ref: "#/channels/gateway/messages/endCall"
      - $ref: "#/channels/gateway/messages/setMuted"
      - $ref: "#/channels/gateway/messages/sendDtmf"
      - $ref: "#/channels/gateway/messages/showInCallScreen"
      - $ref: "#/channels/gateway/messages/ack"
  receiveGatewayEvents:
    action: receive
    channel:
      $ref: "#/channels/gateway"
    messages:
      - $ref: "#/channels/gateway/messages/response"
      - $ref: "#/channels/gateway/messages/smsReceived"
      - $ref: "#/channels/gateway/messages/smsOutboundAccepted"
      - $ref: "#/channels/gateway/messages/smsOutboundSent"
      - $ref: "#/channels/gateway/messages/smsOutboundDelivered"
      - $ref: "#/channels/gateway/messages/smsOutboundFailed"
      - $ref: "#/channels/gateway/messages/mmsReceived"
      - $ref: "#/channels/gateway/messages/mmsOutboundAccepted"
      - $ref: "#/channels/gateway/messages/mmsOutboundSent"
      - $ref: "#/channels/gateway/messages/mmsOutboundDelivered"
      - $ref: "#/channels/gateway/messages/mmsOutboundFailed"
      - $ref: "#/channels/gateway/messages/dialerState"
      - $ref: "#/channels/gateway/messages/callAdded"
      - $ref: "#/channels/gateway/messages/callUpdated"
      - $ref: "#/channels/gateway/messages/callRemoved"
      - $ref: "#/channels/gateway/messages/gatewayState"
components:
  schemas:
    Envelope:
      type: object
      properties:
        type:
          type: string
        requestId:
          type:
            - string
            - "null"
        auth:
          type:
            - string
            - "null"
        timestamp:
          type:
            - integer
            - "null"
          format: int64
        payload:
          type:
            - object
            - "null"
      required:
        - type
    AttachmentPayload:
      type: object
      properties:
        id:
          type:
            - string
            - "null"
        fileName:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type:
            - integer
            - "null"
        base64:
          type:
            - string
            - "null"
        previewBase64:
          type:
            - string
            - "null"
      required:
        - fileName
        - mimeType
    SmsPayload:
      type: object
      properties:
        destination:
          type: string
        body:
          type: string
        subscriptionId:
          type:
            - integer
            - "null"
      required:
        - destination
        - body
    MmsPayload:
      type: object
      properties:
        destination:
          type: string
        body:
          type:
            - string
            - "null"
        subject:
          type:
            - string
            - "null"
        subscriptionId:
          type:
            - integer
            - "null"
        attachment:
          $ref: "#/components/schemas/AttachmentPayload"
      required:
        - destination
        - attachment
    RehydratePayload:
      type: object
      properties:
        since:
          type: integer
          format: int64
        limit:
          type: integer
      required:
        - since
    PlaceCallPayload:
      type: object
      properties:
        number:
          type: string
        speakerphone:
          type: boolean
      required:
        - number
    CallControlPayload:
      type: object
      properties:
        callId:
          type: string
      required:
        - callId
    SetMutedPayload:
      type: object
      properties:
        callId:
          type: string
        muted:
          type: boolean
      required:
        - callId
        - muted
    SendDtmfPayload:
      type: object
      properties:
        callId:
          type: string
        digits:
          type: string
      required:
        - callId
        - digits
    ShowInCallScreenPayload:
      type: object
      properties:
        showDialpad:
          type: boolean
    CallRecord:
      type: object
      properties:
        callId:
          type: string
        number:
          type: string
        displayName:
          type: string
        direction:
          type: string
          enum: [incoming, outgoing, unknown]
        state:
          type: string
        isMuted:
          type: boolean
        route:
          type: string
        isConference:
          type: boolean
        canAnswer:
          type: boolean
        canReject:
          type: boolean
        canDisconnect:
          type: boolean
      required:
        - callId
        - number
        - displayName
        - direction
        - state
        - isMuted
        - route
        - isConference
        - canAnswer
        - canReject
        - canDisconnect
    DialerStatusPayload:
      type: object
      properties:
        dialerRoleGranted:
          type: boolean
        inCallServiceHealthy:
          type: boolean
        activeCalls:
          type: array
          items:
            $ref: "#/components/schemas/CallRecord"
        dialerMissingPermissions:
          type: array
          items:
            type: string
      required:
        - dialerRoleGranted
        - inCallServiceHealthy
        - activeCalls
        - dialerMissingPermissions
    MessageRecord:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [sms, mms]
        threadId:
          type: string
        address:
          type: string
        participants:
          type: array
          items:
            type: string
        displayName:
          type: string
        initials:
          type: string
        body:
          type: string
        subject:
          type:
            - string
            - "null"
        timestamp:
          type: integer
          format: int64
        messageType:
          type: integer
        read:
          type: boolean
        status:
          type:
            - integer
            - "null"
        hasMedia:
          type: boolean
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentPayload"
        subscriptionId:
          type:
            - integer
            - "null"
      required:
        - id
        - kind
        - threadId
        - address
        - participants
        - displayName
        - initials
        - body
        - timestamp
        - messageType
        - read
        - hasMedia
        - attachments
    HistoryResponsePayload:
      type: object
      properties:
        events:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              timestamp:
                type: integer
                format: int64
              payload:
                $ref: "#/components/schemas/MessageRecord"
            required:
              - id
              - type
              - timestamp
              - payload
      required:
        - events
  messages:
    Authenticate:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: authenticate
    GetGatewayState:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: getGatewayState
    RequestDialerRole:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: requestDialerRole
    GetDialerState:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: getDialerState
    ListSubscriptions:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: listSubscriptions
    Rehydrate:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: rehydrate
              payload:
                $ref: "#/components/schemas/RehydratePayload"
    SendSms:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: sendSms
              payload:
                $ref: "#/components/schemas/SmsPayload"
    SendMms:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: sendMms
              payload:
                $ref: "#/components/schemas/MmsPayload"
    PlaceCall:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: placeCall
              payload:
                $ref: "#/components/schemas/PlaceCallPayload"
    AnswerCall:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: answerCall
              payload:
                $ref: "#/components/schemas/CallControlPayload"
    RejectCall:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: rejectCall
              payload:
                $ref: "#/components/schemas/CallControlPayload"
    EndCall:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: endCall
              payload:
                $ref: "#/components/schemas/CallControlPayload"
    SetMuted:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: setMuted
              payload:
                $ref: "#/components/schemas/SetMutedPayload"
    SendDtmf:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: sendDtmf
              payload:
                $ref: "#/components/schemas/SendDtmfPayload"
    ShowInCallScreen:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: showInCallScreen
              payload:
                $ref: "#/components/schemas/ShowInCallScreenPayload"
    Ack:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: ack
    Response:
      payload:
        type: object
        properties:
          type:
            const: response
          requestId:
            type: string
          ok:
            type: boolean
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required:
          - type
          - ok
          - timestamp
          - payload
    SmsReceived:
      payload:
        type: object
        properties:
          type:
            const: sms.received
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/MessageRecord"
        required: [type, timestamp, payload]
    SmsOutboundAccepted:
      payload:
        type: object
        properties:
          type:
            const: sms.outbound.accepted
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    SmsOutboundSent:
      payload:
        type: object
        properties:
          type:
            const: sms.outbound.sent
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    SmsOutboundDelivered:
      payload:
        type: object
        properties:
          type:
            const: sms.outbound.delivered
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    SmsOutboundFailed:
      payload:
        type: object
        properties:
          type:
            const: sms.outbound.failed
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    MmsReceived:
      payload:
        type: object
        properties:
          type:
            const: mms.received
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/MessageRecord"
        required: [type, timestamp, payload]
    MmsOutboundAccepted:
      payload:
        type: object
        properties:
          type:
            const: mms.outbound.accepted
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    MmsOutboundSent:
      payload:
        type: object
        properties:
          type:
            const: mms.outbound.sent
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/MessageRecord"
        required: [type, timestamp, payload]
    MmsOutboundDelivered:
      payload:
        type: object
        properties:
          type:
            const: mms.outbound.delivered
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/MessageRecord"
        required: [type, timestamp, payload]
    MmsOutboundFailed:
      payload:
        type: object
        properties:
          type:
            const: mms.outbound.failed
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    DialerState:
      payload:
        type: object
        properties:
          type:
            const: dialer.state
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/DialerStatusPayload"
        required: [type, timestamp, payload]
    CallAdded:
      payload:
        type: object
        properties:
          type:
            const: call.added
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/CallRecord"
        required: [type, timestamp, payload]
    CallUpdated:
      payload:
        type: object
        properties:
          type:
            const: call.updated
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/CallRecord"
        required: [type, timestamp, payload]
    CallRemoved:
      payload:
        type: object
        properties:
          type:
            const: call.removed
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/CallRecord"
        required: [type, timestamp, payload]
    GatewayState:
      payload:
        type: object
        properties:
          type:
            const: gateway.state
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
