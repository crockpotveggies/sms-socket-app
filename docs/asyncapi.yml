asyncapi: 3.0.0
info:
  title: SMS Socket App Gateway
  version: 0.2.0
  description: |
    Local-only WebSocket API exposed by the Android foreground gateway service.
    SMS behavior remains backward compatible while MMS is added as an additive feature.
servers:
  localGateway:
    host: "{phoneIp}:8787"
    protocol: ws
    description: Connect from the same LAN as the Android device.
    variables:
      phoneIp:
        default: 192.168.1.25
channels:
  gateway:
    address: /
    messages:
      authenticate:
        $ref: "#/components/messages/Authenticate"
      getGatewayState:
        $ref: "#/components/messages/GetGatewayState"
      listSubscriptions:
        $ref: "#/components/messages/ListSubscriptions"
      rehydrate:
        $ref: "#/components/messages/Rehydrate"
      sendSms:
        $ref: "#/components/messages/SendSms"
      sendMms:
        $ref: "#/components/messages/SendMms"
      ack:
        $ref: "#/components/messages/Ack"
      response:
        $ref: "#/components/messages/Response"
      smsReceived:
        $ref: "#/components/messages/SmsReceived"
      smsOutboundAccepted:
        $ref: "#/components/messages/SmsOutboundAccepted"
      smsOutboundSent:
        $ref: "#/components/messages/SmsOutboundSent"
      smsOutboundDelivered:
        $ref: "#/components/messages/SmsOutboundDelivered"
      smsOutboundFailed:
        $ref: "#/components/messages/SmsOutboundFailed"
      mmsReceived:
        $ref: "#/components/messages/MmsReceived"
      mmsOutboundAccepted:
        $ref: "#/components/messages/MmsOutboundAccepted"
      mmsOutboundSent:
        $ref: "#/components/messages/MmsOutboundSent"
      mmsOutboundDelivered:
        $ref: "#/components/messages/MmsOutboundDelivered"
      mmsOutboundFailed:
        $ref: "#/components/messages/MmsOutboundFailed"
      gatewayState:
        $ref: "#/components/messages/GatewayState"
operations:
  sendAuthenticate:
    action: send
    channel:
      $ref: "#/channels/gateway"
    messages:
      - $ref: "#/channels/gateway/messages/authenticate"
  sendCommand:
    action: send
    channel:
      $ref: "#/channels/gateway"
    messages:
      - $ref: "#/channels/gateway/messages/getGatewayState"
      - $ref: "#/channels/gateway/messages/listSubscriptions"
      - $ref: "#/channels/gateway/messages/rehydrate"
      - $ref: "#/channels/gateway/messages/sendSms"
      - $ref: "#/channels/gateway/messages/sendMms"
      - $ref: "#/channels/gateway/messages/ack"
  receiveGatewayEvents:
    action: receive
    channel:
      $ref: "#/channels/gateway"
    messages:
      - $ref: "#/channels/gateway/messages/response"
      - $ref: "#/channels/gateway/messages/smsReceived"
      - $ref: "#/channels/gateway/messages/smsOutboundAccepted"
      - $ref: "#/channels/gateway/messages/smsOutboundSent"
      - $ref: "#/channels/gateway/messages/smsOutboundDelivered"
      - $ref: "#/channels/gateway/messages/smsOutboundFailed"
      - $ref: "#/channels/gateway/messages/mmsReceived"
      - $ref: "#/channels/gateway/messages/mmsOutboundAccepted"
      - $ref: "#/channels/gateway/messages/mmsOutboundSent"
      - $ref: "#/channels/gateway/messages/mmsOutboundDelivered"
      - $ref: "#/channels/gateway/messages/mmsOutboundFailed"
      - $ref: "#/channels/gateway/messages/gatewayState"
components:
  schemas:
    Envelope:
      type: object
      properties:
        type:
          type: string
        requestId:
          type:
            - string
            - "null"
        auth:
          type:
            - string
            - "null"
        timestamp:
          type:
            - integer
            - "null"
          format: int64
        payload:
          type:
            - object
            - "null"
      required:
        - type
    AttachmentPayload:
      type: object
      properties:
        id:
          type:
            - string
            - "null"
        fileName:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type:
            - integer
            - "null"
        base64:
          type:
            - string
            - "null"
        previewBase64:
          type:
            - string
            - "null"
      required:
        - fileName
        - mimeType
    SmsPayload:
      type: object
      properties:
        destination:
          type: string
        body:
          type: string
        subscriptionId:
          type:
            - integer
            - "null"
      required:
        - destination
        - body
    MmsPayload:
      type: object
      properties:
        destination:
          type: string
        body:
          type:
            - string
            - "null"
        subject:
          type:
            - string
            - "null"
        subscriptionId:
          type:
            - integer
            - "null"
        attachment:
          $ref: "#/components/schemas/AttachmentPayload"
      required:
        - destination
        - attachment
    RehydratePayload:
      type: object
      properties:
        since:
          type: integer
          format: int64
        limit:
          type: integer
      required:
        - since
    MessageRecord:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [sms, mms]
        threadId:
          type: string
        address:
          type: string
        participants:
          type: array
          items:
            type: string
        displayName:
          type: string
        initials:
          type: string
        body:
          type: string
        subject:
          type:
            - string
            - "null"
        timestamp:
          type: integer
          format: int64
        messageType:
          type: integer
        read:
          type: boolean
        status:
          type:
            - integer
            - "null"
        hasMedia:
          type: boolean
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentPayload"
        subscriptionId:
          type:
            - integer
            - "null"
      required:
        - id
        - kind
        - threadId
        - address
        - participants
        - displayName
        - initials
        - body
        - timestamp
        - messageType
        - read
        - hasMedia
        - attachments
    HistoryResponsePayload:
      type: object
      properties:
        events:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              timestamp:
                type: integer
                format: int64
              payload:
                $ref: "#/components/schemas/MessageRecord"
            required:
              - id
              - type
              - timestamp
              - payload
      required:
        - events
  messages:
    Authenticate:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: authenticate
    GetGatewayState:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: getGatewayState
    ListSubscriptions:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: listSubscriptions
    Rehydrate:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: rehydrate
              payload:
                $ref: "#/components/schemas/RehydratePayload"
    SendSms:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: sendSms
              payload:
                $ref: "#/components/schemas/SmsPayload"
    SendMms:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: sendMms
              payload:
                $ref: "#/components/schemas/MmsPayload"
    Ack:
      payload:
        allOf:
          - $ref: "#/components/schemas/Envelope"
          - type: object
            properties:
              type:
                const: ack
    Response:
      payload:
        type: object
        properties:
          type:
            const: response
          requestId:
            type: string
          ok:
            type: boolean
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required:
          - type
          - ok
          - timestamp
          - payload
    SmsReceived:
      payload:
        type: object
        properties:
          type:
            const: sms.received
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/MessageRecord"
        required: [type, timestamp, payload]
    SmsOutboundAccepted:
      payload:
        type: object
        properties:
          type:
            const: sms.outbound.accepted
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    SmsOutboundSent:
      payload:
        type: object
        properties:
          type:
            const: sms.outbound.sent
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    SmsOutboundDelivered:
      payload:
        type: object
        properties:
          type:
            const: sms.outbound.delivered
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    SmsOutboundFailed:
      payload:
        type: object
        properties:
          type:
            const: sms.outbound.failed
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    MmsReceived:
      payload:
        type: object
        properties:
          type:
            const: mms.received
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/MessageRecord"
        required: [type, timestamp, payload]
    MmsOutboundAccepted:
      payload:
        type: object
        properties:
          type:
            const: mms.outbound.accepted
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    MmsOutboundSent:
      payload:
        type: object
        properties:
          type:
            const: mms.outbound.sent
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/MessageRecord"
        required: [type, timestamp, payload]
    MmsOutboundDelivered:
      payload:
        type: object
        properties:
          type:
            const: mms.outbound.delivered
          timestamp:
            type: integer
            format: int64
          payload:
            $ref: "#/components/schemas/MessageRecord"
        required: [type, timestamp, payload]
    MmsOutboundFailed:
      payload:
        type: object
        properties:
          type:
            const: mms.outbound.failed
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
    GatewayState:
      payload:
        type: object
        properties:
          type:
            const: gateway.state
          timestamp:
            type: integer
            format: int64
          payload:
            type: object
        required: [type, timestamp, payload]
